language: en
script: Latin
pack_scope: relations

normalization:
  unicode_normal_form: NFC
  lowercase_for_indexing: true
  strip_diacritics: false

punctuation:
  strategy: preserve

spacing:
  strategy: whitespace-split

script_direction: ltr

notes: >
  Relation lemmas include one phrasal verb (depends_on: "depends on").
  Indexing uses the lemma_id form (underscore-joined) for lookup;
  surface tokenization produces two tokens which lift_rules.py
  must handle as a phrasal unit.
