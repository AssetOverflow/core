# Layer 2 atomic grounding for everyday concrete objects.
# 83 lemmas with full senses, frames, morphology, and probes.
# Thickens the semantic manifold before any composed or technical
# expansion. Prerequisites: packs/en (base), packs/primitives,
# packs/identity, packs/safety.
#
# Semantic families covered:
#   artifact (containers, furniture, tools, structures, light-sources)
#   substance (natural, food, biological)
#   organism (plant, animal, body-part)
#   place (landform, waterway, path, structure)
#   phenomenon (elemental, weather, celestial, temporal)
#   agent (human)
#   logos (name, identity)

[contracts]
