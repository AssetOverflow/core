language: en
script: Latin

normalization:
  unicode_normal_form: NFC
  lowercase_for_indexing: true
  # Surface forms preserve original casing.
  # Indexing and lemma lookup use lowercased forms.
  strip_diacritics: false

punctuation:
  strategy: preserve

spacing:
  strategy: whitespace-split

script_direction: ltr

notes: >
  Inherits English base orthography from packs/en/orthography.yaml.
  No overrides required — all lemmas are standard lowercase Latin forms.
